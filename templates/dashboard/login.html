{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Вход — Webordo Кабинет</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;800;900&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#FF4D1C;--accent2:#FF8A00;--teal:#00B896;--border:rgba(0,0,0,0.09)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#FFF1EB 0%,#F4F6FB 60%,#EEF2FF 100%);
      font-family:'Geologica',sans-serif;font-weight:300;
    }
    .login-wrap{
      width:100%;max-width:420px;padding:20px;
    }
    .login-logo{
      font-family:'Unbounded',sans-serif;font-weight:900;font-size:26px;
      letter-spacing:-1.5px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-align:center;margin-bottom:8px;
    }
    .login-sub{text-align:center;font-size:14px;color:#8B96A8;margin-bottom:32px}
    .login-card{
      background:#fff;border-radius:24px;
      border:1px solid var(--border);
      box-shadow:0 8px 40px rgba(0,0,0,0.09);
      padding:36px 32px;
    }
    .login-title{
      font-family:'Unbounded',sans-serif;font-weight:800;
      font-size:20px;letter-spacing:-.5px;color:#0D1117;
      margin-bottom:24px;text-align:center;
    }
    .form-group{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:#374151;letter-spacing:.3px;text-transform:uppercase;margin-bottom:7px}
    input{
      width:100%;padding:13px 16px;border-radius:12px;
      border:1.5px solid var(--border);
      font-family:'Geologica',sans-serif;font-size:14px;color:#0D1117;
      background:#F8F9FC;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:rgba(255,77,28,.4);box-shadow:0 0 0 4px rgba(255,77,28,.08);background:#fff}
    .btn-submit{
      width:100%;padding:14px;border-radius:100px;border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;font-family:'Geologica',sans-serif;font-size:15px;font-weight:600;
      cursor:pointer;margin-top:8px;
      box-shadow:0 4px 20px rgba(255,77,28,.28);
      transition:transform .2s,box-shadow .2s;
    }
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,77,28,.35)}
    .error-msg{
      background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);
      border-radius:10px;padding:10px 14px;
      font-size:13px;color:#B91C1C;font-weight:500;margin-bottom:16px;
    }
    .login-back{
      text-align:center;margin-top:20px;font-size:13px;color:#8B96A8;
    }
    .login-back a{color:var(--accent);text-decoration:none;font-weight:500}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">Webordo</div>
  <div class="login-sub">Личный кабинет ресторана</div>

  <div class="login-card">
    <div class="login-title">Войти в кабинет</div>

    {% if messages %}
      {% for msg in messages %}
        <div class="error-msg">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" placeholder="Ваш логин" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit">Войти →</button>
    </form>
  </div>

  <div class="login-back">
    <a href="/">← На главную</a>
  </div>
</div>
</body>
</html>
