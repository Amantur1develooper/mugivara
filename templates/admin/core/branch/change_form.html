{% extends "admin/change_form.html" %}
{% load i18n %}

{% block object-tools-items %}
  {{ block.super }}
  {% if change and not is_popup %}
    <li>
      <a class="button" href="{% url 'admin:core_branch_sync_menu' object_id %}">
        Синхронизировать меню
      </a>
    </li>
    {% if request.user.is_superuser %}
    <li>
      <a class="button" style="background:#2563eb;color:#fff;"
         href="{% url 'admin:core_branch_duplicate' object_id %}">
        📋 Дублировать филиал
      </a>
    </li>
    {% endif %}
  {% endif %}
{% endblock %}
